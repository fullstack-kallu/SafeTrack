{% extends "admin/admin_base.html" %}
{% load static %}

{% block page_title %}Worker Registration{% endblock %}

{% block main_content %}

<div class="glass-bg">

    <div class="wizard-card">

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress"></div>
        </div>

        <form action="/regworkerinsert/" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- STEP 1 -->
            <div class="form-step active">

                <div class="step-image">
                    <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216" alt="Registration">
                </div>

                <h3>Basic Information</h3>

                <div class="form-group">
                    <label>Profile Image</label>
                    <input type="file" name="image" required>
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="worker_name" placeholder="Enter full name" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Male" required> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" name="dob" id="dob" required>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" id="age" min="18" max="65" required>
                </div>

                <button type="button" class="next-btn">Next</button>
            </div>

            <!-- STEP 2 -->
            <div class="form-step">

                <h3>Contact Details</h3>

                <div class="form-group">
                    <label>Aadhar Number</label>
                    <input type="text" name="aadhar_number" maxlength="12" placeholder="12-digit number" required>
                </div>

                <div class="form-group">
                    <label>Languages Known</label>
                    <input type="text" name="languages_known" required>
                </div>

                <div class="form-group">
                    <label>Place</label>
                    <input type="text" name="place" required>
                </div>

                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" name="mobile" maxlength="10" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="btn-group">
                    <button type="button" class="prev-btn">Back</button>
                    <button type="button" class="next-btn">Next</button>
                </div>
            </div>

            <!-- STEP 3 -->
            <div class="form-step">

                <h3>Security Details</h3>

                <div class="form-group">
                    <label>Address</label>
                    <textarea name="address" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="paswd" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" required>
                </div>

                <div class="btn-group">
                    <button type="button" class="prev-btn">Back</button>
                    <button type="submit" class="submit-btn">Register Worker</button>
                </div>
            </div>

        </form>
    </div>
</div>

<style>

/* Full Background */
.glass-bg {
    min-height: 100vh;
    background: url("https://images.unsplash.com/photo-1508780709619-79562169bc64") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
}

/* Glass Card */
.wizard-card {
    width: 100%;
    max-width: 650px;
    padding: 40px;
    border-radius: 25px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
}

/* Progress Bar */
.progress-container {
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    margin-bottom: 30px;
}

.progress {
    height: 100%;
    width: 33%;
    background: #3B82F6;
    border-radius: 10px;
    transition: 0.4s;
}

/* Steps */
.form-step {
    display: none;
    animation: fadeSlide 0.5s ease;
}

.form-step.active {
    display: block;
}

@keyframes fadeSlide {
    from {opacity: 0; transform: translateX(30px);}
    to {opacity: 1; transform: translateX(0);}
}

/* Image */
.step-image img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}

/* Form */
.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

.form-group label {
    font-size: 13px;
    margin-bottom: 5px;
}

/* 🔥 FIXED INPUT COLOR */
.form-group input,
.form-group textarea {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.1);
    outline: none;
    background: rgba(255,255,255,0.95);
    color: #000;
    font-size: 14px;
}

.form-group input::placeholder,
.form-group textarea::placeholder {
    color: #555;
}

/* Radio */
.radio-group {
    display: flex;
    gap: 20px;
}

.radio-group label {
    color: white;
}

/* Buttons */
.next-btn,
.prev-btn,
.submit-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
    font-weight: 600;
}

.next-btn,
.submit-btn {
    background: #3B82F6;
    color: white;
}

.prev-btn {
    background: #6B7280;
    color: white;
}

.btn-group {
    display: flex;
    justify-content: space-between;
}

/* Responsive */
@media(max-width:768px){
    .wizard-card {
        padding: 20px;
    }
}

</style>

<script>

const steps = document.querySelectorAll(".form-step");
const nextBtns = document.querySelectorAll(".next-btn");
const prevBtns = document.querySelectorAll(".prev-btn");
const progress = document.querySelector(".progress");

let currentStep = 0;

nextBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        steps[currentStep].classList.remove("active");
        currentStep++;
        steps[currentStep].classList.add("active");
        updateProgress();
    });
});

prevBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        steps[currentStep].classList.remove("active");
        currentStep--;
        steps[currentStep].classList.add("active");
        updateProgress();
    });
});

function updateProgress(){
    progress.style.width = ((currentStep + 1) / steps.length) * 100 + "%";
}

steps[0].classList.add("active");

// Auto age calculation
document.getElementById("dob").addEventListener("change", function() {
    const dob = new Date(this.value);
    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    document.getElementById("age").value = age;
});

</script>

{% endblock %}
