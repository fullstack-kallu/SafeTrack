{% extends "admin/admin_base.html" %}
{% load static %}

{% block page_title %}Edit Worker Profile{% endblock %}

{% block main_content %}
<div class="profile-wrapper animate__animated animate__fadeIn">

    <div class="profile-card">

        <!-- Top Profile Section -->
        <div class="profile-header">
            <div class="profile-image">
                <img src="/media/{{data.image}}">
            </div>
            <div class="profile-info">
                <h3>{{data.worker_name}}</h3>
                <p>ID Number: <strong>{{data.aadhar_number}}</strong></p>
                <span class="register-date">Registered on {{data.regis_date}}</span>
            </div>
        </div>

        <!-- Form -->
        <form action="/editadminworker3/" method="get">
            <input type="hidden" name="worker_id" value="{{data.worker_id}}">

            <div class="form-grid">

                <!-- Left Column -->
                <div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" value="{{data.worker_name}}" required>
                    </div>

                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" value="{{data.dob}}" required>
                    </div>

                    <div class="form-group">
                        <label>Place</label>
                        <input type="text" name="place" value="{{data.place}}" required>
                    </div>

                    <div class="form-group">
                        <label>Aadhar Number</label>
                        <input type="text" name="aadhar_number" value="{{data.aadhar_number}}" required>
                    </div>

                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" name="mobile" value="{{data.mobile}}" required>
                    </div>
                </div>

                <!-- Right Column -->
                <div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{data.email}}" required>
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" value="{{data.phone}}">
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea name="address" rows="3" required>{{data.address}}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Languages Known</label>
                        <input type="text" name="languages_known" value="{{data.languages_known}}" required>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="save-btn">
                            Save Changes
                        </button>
                        <button type="reset" class="reset-btn">
                            Reset
                        </button>
                    </div>
                </div>

            </div>
        </form>

    </div>
</div>

<style>

/* ===== PAGE ===== */
.profile-wrapper{
    padding:20px;
    background:#f4f6f9;
}

/* ===== CARD ===== */
.profile-card{
    background:#ffffff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* ===== HEADER ===== */
.profile-header{
    display:flex;
    align-items:center;
    gap:25px;
    margin-bottom:35px;
    border-bottom:1px solid #e5e7eb;
    padding-bottom:20px;
}

.profile-image img{
    width:110px;
    height:110px;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.profile-info h3{
    margin:0;
    font-size:22px;
    font-weight:700;
    color:#1e293b;
}

.profile-info p{
    margin:6px 0;
    color:#64748b;
}

.register-date{
    font-size:13px;
    color:#94a3b8;
}

/* ===== FORM ===== */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.form-group{
    display:flex;
    flex-direction:column;
    margin-bottom:18px;
}

.form-group label{
    font-size:13px;
    font-weight:600;
    margin-bottom:6px;
    color:#475569;
}

.form-group input,
.form-group textarea{
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #d1d5db;
    font-size:14px;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 0 3px rgba(59,130,246,0.15);
}

/* ===== BUTTONS ===== */
.button-group{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.save-btn{
    flex:2;
    padding:12px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.save-btn:hover{
    background:#2563eb;
}

.reset-btn{
    flex:1;
    padding:12px;
    background:#f1f5f9;
    border:1px solid #d1d5db;
    border-radius:10px;
    cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .profile-header{
        flex-direction:column;
        align-items:flex-start;
    }
}

</style>

{% endblock %}
