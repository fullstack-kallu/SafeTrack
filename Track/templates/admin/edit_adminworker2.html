{% extends "admin/admin_base.html" %}
{% load static %}

{% block page_title %}Subject Profile Configuration Audit{% endblock %}

{% block main_content %}
<div class="animate-fade-up">
    <div class="admin-card">
        <div
            style="display: flex; align-items: center; gap: 30px; margin-bottom: 40px; padding-bottom: 25px; border-bottom: 1px solid #F1F5F9;">
            <div style="position: relative;">
                <img src="/media/{{data.image}}"
                    style="width: 120px; height: 120px; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                <div
                    style="position: absolute; bottom: -10px; right: -10px; background: var(--admin-accent); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid white;">
                    <i class="fa-solid fa-camera" style="font-size: 14px;"></i>
                </div>
            </div>
            <div>
                <h4 style="margin: 0; font-weight: 800; font-size: 24px;">{{data.worker_name}}</h4>
                <p style="font-size: 14px; color: #64748B; margin: 5px 0;">Intelligence Identifier: <span
                        style="font-family: monospace; font-weight: 700;">{{data.aadhar_number}}</span></p>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <span
                        style="background: #DBEAFE; color: #3B82F6; padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 800;">SECURED
                        NODE</span>
                    <span
                        style="background: #F8FAFC; color: #64748B; padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 800;">REG:
                        {{data.regis_date}}</span>
                </div>
            </div>
        </div>

        <form action="/editadminworker3/" method="get">
            <input type="hidden" name="worker_id" value="{{data.worker_id}}">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <!-- Column 1 -->
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="form-group-admin">
                        <label>Personnel Full Name</label>
                        <input type="text" name="name" value="{{data.worker_name}}" required>
                    </div>

                    <div class="form-group-admin">
                        <label>Temporal Status (DOB)</label>
                        <input type="date" name="dob" value="{{data.dob}}" required>
                    </div>

                    <div class="form-group-admin">
                        <label>Geographic Sector (Place)</label>
                        <input type="text" name="place" value="{{data.place}}" required>
                    </div>

                    <div class="form-group-admin">
                        <label>Security Identifier (Aadhar)</label>
                        <input type="text" name="aadhar_number" value="{{data.aadhar_number}}" required>
                    </div>

                    <div class="form-group-admin">
                        <label>Primary Signal (Mobile)</label>
                        <input type="text" name="mobile" value="{{data.mobile}}" required>
                    </div>
                </div>

                <!-- Column 2 -->
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="form-group-admin">
                        <label>Communication Node (Email)</label>
                        <input type="email" name="email" value="{{data.email}}" required>
                    </div>

                    <div class="form-group-admin">
                        <label>Registry Landline</label>
                        <input type="text" name="phone" value="{{data.phone}}">
                    </div>

                    <div class="form-group-admin">
                        <label>Residential Coordinates (Address)</label>
                        <textarea name="address" rows="3" required>{{data.address}}</textarea>
                    </div>

                    <div class="form-group-admin">
                        <label>Linguistic Capability</label>
                        <input type="text" name="languages_known" value="{{data.languages_known}}" required>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <button type="submit" class="btn-admin btn-primary"
                            style="flex: 2; justify-content: center; padding: 15px;">
                            <i class="fa-solid fa-cloud-arrow-up"></i> COMMIT CONFIGURATION
                        </button>
                        <button type="reset" class="btn-admin"
                            style="flex: 1; background: #F8FAFC; color: #64748B; border: 1px solid #E2E8F0; justify-content: center;">
                            RESET
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
    .form-group-admin {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-group-admin label {
        font-size: 11px;
        font-weight: 800;
        color: #94A3B8;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group-admin input,
    .form-group-admin textarea {
        padding: 12px 18px;
        border-radius: 12px;
        border: 1px solid #E2E8F0;
        outline: none;
        background: #F8FAFC;
        font-size: 14px;
        transition: var(--transition);
    }

    .form-group-admin input:focus,
    .form-group-admin textarea:focus {
        border-color: var(--admin-accent);
        background: white;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.08);
    }
</style>
{% endblock %}
