{% extends 'agency/agency_base.html' %}
{% load static %}

{% block title %}Edit Feedback{% endblock %}

{% block extra_css %}
<style>

/* ===== Form Card ===== */
.feedback-card {
    max-width: 550px;
    margin: 30px auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* ===== Title ===== */
.feedback-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 25px;
    color: #0d6efd;
    border-left: 5px solid #0d6efd;
    padding-left: 12px;
}

/* ===== Form Group ===== */
.form-group-modern {
    margin-bottom: 20px;
}

.form-group-modern label {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 8px;
    display: block;
}

.input-modern,
.textarea-modern {
    width: 100%;
    padding: 12px 15px;
    border-radius: 10px;
    border: 2px solid #e2e8f0;
    font-size: 14px;
    transition: 0.3s;
}

.input-modern:focus,
.textarea-modern:focus {
    border-color: #0d6efd;
    outline: none;
    box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
}

.textarea-modern {
    min-height: 120px;
    resize: vertical;
}

/* ===== Button ===== */
.btn-edit {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg,#0d6efd,#4dabf7);
    border: none;
    border-radius: 12px;
    font-weight: 700;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-edit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(13,110,253,0.3);
}

/* ===== Responsive ===== */
@media(max-width:768px){
    .feedback-card{
        padding:20px;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="page-header-accent">
    <h2 class="h4 font-weight-bold">Edit Feedback</h2>
    <p class="text-muted small">Update the feedback details below.</p>
</div>

<div class="feedback-card">

    <div class="feedback-title">
        <i class="fas fa-edit mr-2"></i> Edit Feedback Details
    </div>

    {% for i in list %}
    <form action="/editfeedbackworker3/" method="POST">
        {% csrf_token %}

        <input type="hidden" name="feedbackid" value="{{ i.feedback_id }}">

        <div class="form-group-modern">
            <label>Feedback Title</label>
            <input type="text"
                   name="feedback_title"
                   class="input-modern"
                   value="{{ i.feedback_title }}"
                   required>
        </div>

        <div class="form-group-modern">
            <label>Description</label>
            <textarea name="des"
                      class="textarea-modern"
                      required>{{ i.feedback_description }}</textarea>
        </div>

        <button type="submit" class="btn-edit">
            <i class="fas fa-save mr-1"></i> Update Feedback
        </button>

    </form>
    {% endfor %}

</div>

{% endblock %}
