{% extends 'agency/agency_base.html' %}
{% load static %}

{% block title %}SafeTrack - Assign Work{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #eef2f7, #e4e9f2);
        font-family: 'Open Sans', sans-serif;
        min-height: 100vh;
    }

    /* Center Content */
    .content-area {
        display: flex;
        justify-content: center;
        padding: 60px 15px;
    }

    /* Card */
    .form-card {
        width: 100%;
        max-width: 500px;
        background: #ffffff;
        padding: 35px;
        border-radius: 14px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        border-top: 5px solid #007bff;
    }

    /* Title */
    .form-title {
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 30px;
        color: #2c3e50;
    }

    /* Form Group */
    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #34495e;
    }

    .form-group input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #dcdde1;
        border-radius: 8px;
        font-size: 14px;
        transition: 0.3s ease;
        background: #f8f9fa;
    }

    .form-group input:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        background: #ffffff;
        outline: none;
    }

    /* Button */
    .submit-button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #28a745, #20c997);
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        transition: 0.3s ease;
        margin-top: 10px;
    }

    .submit-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
    }

    /* Responsive */
    @media (max-width: 576px) {
        .form-card {
            padding: 25px;
        }

        .form-title {
            font-size: 18px;
        }
    }
</style>
{% endblock %}

{% block content %}

<div class="content-area">
    <div class="form-card">

        <div class="form-title">
            Assign Work Schedule
        </div>

        <form action="/jobsheddule2/" method="post">
            {% csrf_token %}

            <!-- Hidden Worker ID -->
            <input type="hidden" name="worker_id" value="{{ worker_id }}">

            <div class="form-group">
                <label>Work Description</label>
                <input type="text" name="work" required 
                       placeholder="e.g., Daily Cleaning, Maintenance">
            </div>

            <div class="form-group">
                <label>Salary / Pay Rate</label>
                <input type="text" name="salary" required 
                       placeholder="e.g., ₹800/day or ₹150/hr">
            </div>

            <div class="form-group">
                <label>Time Schedule (Hours)</label>
                <input type="text" name="working_houres" required 
                       placeholder="e.g., 9:00 AM - 5:00 PM">
            </div>

            <button type="submit" class="submit-button">
                ASSIGN WORK
            </button>

        </form>

    </div>
</div>

{% endblock %}
