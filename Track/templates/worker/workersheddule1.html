<html lang="en">
  <head>
    <title>Worker Schedule Date Range</title>
    {% include "police/policeheder.html" %}
    
    <style>
        /* General body styling */
        body {
            background-color: #f0f0f0; 
            font-family: 'Open Sans', Arial, sans-serif;
            padding-top: 100px; /* Space below the fixed header */
        }

        /* Container for the form (The Card) */
        .form-card {
            background-color: rgba(63, 81, 181, 0.9); /* Deep Blue/Indigo with opacity */
            width: 90%; 
            max-width: 400px; /* Constrain width for a compact form */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            color: white;
            margin: 50px auto;
        }

        /* Title Styling */
        .form-title {
            font-size: 1.6em; 
            font-weight: 700;
            color: #ff9800; /* Orange highlight */
            text-align: center;
            padding-bottom: 20px;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        /* Table/Form Layout Styling */
        .schedule-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px; /* Add vertical spacing between rows */
        }

        .schedule-table td {
            padding: 0;
            vertical-align: middle;
            font-size: 1.0em;
        }

        /* Input Styling */
        .schedule-table input[type="Date"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #ffffff;
            color: #333;
            box-sizing: border-box;
            font-size: 1.0em;
            transition: border 0.3s;
        }

        /* Input Focus Effect */
        .schedule-table input[type="Date"]:focus {
            outline: none;
            box-shadow: 0 0 0 3px #ff9800; /* Orange glow on focus */
        }

        /* Submit Button Styling */
        .submit-btn {
            background-color: #ff9800; /* Orange color for the action */
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1em;
            text-transform: uppercase;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 20px;
            width: 100%; /* Make button full width */
        }
        
        .submit-btn:hover {
            background-color: #fb8c00;
            transform: translateY(-1px);
        }

    </style>
  </head>
  <body>
<center>
    <div class="form-card">
        <div class="form-title">
            <i class="fa fa-calendar"></i> View Worker Schedules
        </div>
        <form action="/workersheddule2/" method="get" > 
              
            <table class="schedule-table" align="center">
                <tr>
                    <td>Start Date</td>
                    <td><input type="Date" name="start" required></td>
                </tr>
                <tr>
                    <td>End Date</td>
                    <td><input type="Date" name="end" required></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" class="submit-btn" name="submit" value="Take Informations">
                    </td>
                </tr>
            </table>
        </form>
    </div>
</center>

<table id="table_id" align="center" style="background-color:white;color:#000000; margin-top: 20px;">
</table>
