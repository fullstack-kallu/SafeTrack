{% extends 'police/policeheder.html' %}
{% load static %}

{% block title %}View Worker Schedules{% endblock %}

{% block extra_css %}
<style>

.page-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

/* Card */
.schedule-card{
    background:linear-gradient(135deg,#4F46E5,#4338CA);
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:450px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    color:#fff;
}

/* Title */
.schedule-title{
    font-size:22px;
    font-weight:700;
    text-align:center;
    margin-bottom:30px;
    color:#FF9800;
    letter-spacing:1px;
}

.schedule-title i{
    margin-right:8px;
}

/* Form group */
.form-group{
    margin-bottom:20px;
}

.form-group label{
    font-size:14px;
    font-weight:600;
    display:block;
    margin-bottom:6px;
}

.form-group input{
    width:100%;
    padding:10px 12px;
    border:none;
    border-radius:8px;
    font-size:14px;
}

/* Focus effect */
.form-group input:focus{
    outline:none;
    box-shadow:0 0 0 3px rgba(255,152,0,0.5);
}

/* Button */
.submit-btn{
    width:100%;
    padding:12px;
    background:#FF9800;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#FB8C00;
    transform:translateY(-2px);
}

/* Responsive */
@media(max-width:768px){
    .schedule-card{
        padding:25px;
    }

    .schedule-title{
        font-size:18px;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="main-content">
    <div class="page-wrapper">

        <div class="schedule-card">

            <div class="schedule-title">
                <i class="fa-solid fa-calendar-days"></i>
                VIEW WORKER SCHEDULES
            </div>

            <form action="/workersheddule2/" method="get">

                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" name="start" required>
                </div>

                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" name="end" required>
                </div>

                <button type="submit" class="submit-btn">
                    TAKE INFORMATIONS
                </button>

            </form>

        </div>

    </div>
</div>

{% endblock %}
