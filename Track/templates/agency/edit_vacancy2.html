{% extends 'agency/agency_base.html' %}
{% load static %}

{% block title %}Edit Vacancy{% endblock %}

{% block extra_css %}
<style>

/* ===== Page Header ===== */
.page-header-accent h2 {
    font-size: 2rem;
    font-weight: 700;
}

/* ===== Form Card ===== */
.edit-card {
    max-width: 650px;
    margin: 30px auto;
    padding: 30px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* ===== Form Title ===== */
.edit-title {
    font-size: 22px;
    font-weight: 700;
    color: #ffc107;
    margin-bottom: 25px;
    text-align: center;
}

/* ===== Form Groups ===== */
.form-group-modern {
    margin-bottom: 20px;
}

.form-group-modern label {
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
    color: #343a40;
}

.input-modern,
.textarea-modern {
    width: 100%;
    padding: 12px 15px;
    border-radius: 10px;
    border: 2px solid #e2e8f0;
    font-size: 14px;
    transition: 0.3s;
}

.input-modern:focus,
.textarea-modern:focus {
    border-color: #ffc107;
    outline: none;
    box-shadow: 0 0 0 3px rgba(255,193,7,0.2);
}

.textarea-modern {
    min-height: 120px;
    resize: vertical;
}

/* ===== Button ===== */
.btn-update {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg,#ffc107,#ff9800);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-update:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255,152,0,0.3);
}

/* ===== Responsive ===== */
@media(max-width:768px){
    .edit-card{
        padding:20px;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="page-header-accent">
    <h2>Edit Vacancy</h2>
    <p class="text-muted small">Update your posted vacancy details below.</p>
</div>

<div class="edit-card">

    <div class="edit-title">
        <i class="fas fa-pen mr-2"></i> Edit Vacancy Details
    </div>

    {% for i in list %}
    <form action="/editvacancy3/" method="get">

        <input type="hidden" name="vacancyid" value="{{ i.vacancy_id }}">

        <div class="form-group-modern">
            <label>Vacancy Title</label>
            <input type="text"
                   name="vacancy"
                   class="input-modern"
                   value="{{ i.vacancy }}"
                   pattern="[a-zA-Z\s]+"
                   required>
        </div>

        <div class="form-group-modern">
            <label>Number of Openings</label>
            <input type="text"
                   name="num"
                   class="input-modern"
                   value="{{ i.vacancy_no }}"
                   pattern="[0-9]+"
                   title="Only numbers allowed"
                   required>
        </div>

        <div class="form-group-modern">
            <label>Job Description</label>
            <textarea name="des"
                      class="textarea-modern"
                      required>{{ i.description }}</textarea>
        </div>

        <button type="submit" class="btn-update">
            <i class="fas fa-sync-alt mr-1"></i> Update Vacancy
        </button>

    </form>
    {% endfor %}

</div>

{% endblock %}
