{% extends 'agency/agency_base.html' %}
{% load static %}

{% block title %}Update Employer Details{% endblock %}

{% block content %}
<div class="page-header-accent" style="border-left-color: #0d6efd;">
    <h2 class="h4 font-weight-bold">Update My Employer Details</h2>
    <p class="text-muted small">Edit your profile information and click update to save changes.</p>
</div>

<div class="glass-card">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            {% for i in list %}
            <form action="/update_employer/" method="get" class="modern-form">
                <input type="hidden" name="empid" value="{{ i.emp_id }}" />
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" id="name" name="name" value="{{ i.name }}" pattern="[a-zA-Z\s]+" required class="form-control">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Gender</label>
                            <div class="gender-options">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="Gender" id="genderMale" value="male" {% if i.gender == 'male' %}checked{% endif %}>
                                    <label class="form-check-label" for="genderMale">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="Gender" id="genderFemale" value="female" {% if i.gender == 'female' %}checked{% endif %}>
                                    <label class="form-check-label" for="genderFemale">Female</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="firm_name" class="form-label">Office Name</label>
                            <input type="text" id="firm_name" name="Firm_name" value="{{ i.firm_name }}" pattern="[a-zA-Z0-9\s]+" required class="form-control">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="aadhar_number" class="form-label">Aadhar Number</label>
                            <input type="text" id="aadhar_number" name="Aadhar_number" value="{{ i.aadhar_no }}" pattern="[0-9]{12}" title="Aadhar number must be 12 digits" required class="form-control">
                        </div>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="dob" class="form-label">Date of Birth</label>
                            <input type="date" id="dob" value="{{ i.dob }}" name="DOB" required class="form-control">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="place" class="form-label">Place</label>
                            <input type="text" id="place" name="Place" value="{{ i.place }}" pattern="[a-zA-Z\s]+" required class="form-control">
                        </div>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="text" id="phone" name="Phone" value="{{ i.phone }}" pattern="[0-9]{7,15}" title="Enter a valid phone number" required class="form-control">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="mobile" class="form-label">Mobile</label>
                            <input type="text" id="mobile" name="Mobile" value="{{ i.mobile }}" pattern="[0-9]{10}" title="Mobile number must be 10 digits" required class="form-control">
                        </div>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="email" class="form-label">Email ID</label>
                            <input type="email" id="email" name="Email_id" value="{{ i.email }}" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Enter a valid email address" required class="form-control">
                        </div>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="form-group">
                            <label for="address" class="form-label">Address</label>
                            <textarea id="address" name="Emp_address" rows="3" required class="form-control">{{ i.emp_address }}</textarea>
                        </div>
                    </div>
                </div>
                
                <div class="form-actions text-center">
                    <button type="submit" class="btn-modern btn-lg">
                        <i class="fas fa-check-circle me-2"></i> Update Details
                    </button>
                </div>
            </form>
            {% endfor %}
        </div>
    </div>
</div>

<style>
    .modern-form .form-group {
        margin-bottom: 0;
    }
    
    .modern-form .form-label {
        display: block;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
    }
    
    .modern-form .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        background: #fff;
    }
    
    .modern-form .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        outline: none;
    }
    
    .modern-form .gender-options {
        display: flex;
        gap: 1.5rem;
        padding-top: 0.5rem;
    }
    
    .modern-form .form-check-input {
        width: 1.25rem;
        height: 1.25rem;
        margin-right: 0.5rem;
        cursor: pointer;
    }
    
    .modern-form .form-check-label {
        cursor: pointer;
        font-size: 0.95rem;
    }
    
    .modern-form .form-actions {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-color);
    }
    
    .modern-form .btn-lg {
        padding: 0.875rem 2.5rem;
        font-size: 1rem;
    }
    
    @media (max-width: 768px) {
        .modern-form .row {
            margin-bottom: 0 !important;
        }
        
        .modern-form .col-md-6 {
            margin-bottom: 1.5rem;
        }
        
        .modern-form .gender-options {
            flex-direction: row;
            gap: 1rem;
        }
    }
</style>
{% endblock %}
