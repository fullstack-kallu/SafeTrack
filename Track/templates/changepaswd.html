{% extends 'agency/agency_base.html' %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="page-header-accent">
    <h2 class="h4 font-weight-bold">Change Password</h2>
    <p class="text-muted small">Update your account password for security.</p>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="glass-card">
            <form action="/changepassword/" method="get">
                <div class="form-group mb-3">
                    <label class="font-weight-600 mb-2">Email / Username</label>
                    <input type="text" name="user" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group mb-3">
                    <label class="font-weight-600 mb-2">Old Password</label>
                    <input type="password" name="opass" class="form-control" placeholder="Enter current password"
                        required>
                </div>
                <div class="form-group mb-3">
                    <label class="font-weight-600 mb-2">New Password</label>
                    <input type="password" name="npass" class="form-control" placeholder="Enter new password" required>
                </div>
                <div class="form-group mb-3">
                    <label class="font-weight-600 mb-2">Confirm New Password</label>
                    <input type="password" name="rpass" class="form-control" placeholder="Re-enter new password"
                        required>
                </div>
                <div class="text-right mt-4">
                    <button type="submit" class="btn-modern px-4 py-2">
                        <i class="fas fa-key mr-2"></i> CHANGE PASSWORD
                    </button>
                </div>
            </form>
        </div>

        <div class="glass-card mt-3" style="background: #dbeafe; border-color: #3b82f6;">
            <div class="d-flex align-items-start">
                <i class="fas fa-info-circle mr-3 mt-1" style="color: #1d4ed8;"></i>
                <div class="small" style="color: #1e40af;">
                    <strong>Security Tip:</strong> Use a strong password with a mix of letters, numbers, and special
                    characters.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
